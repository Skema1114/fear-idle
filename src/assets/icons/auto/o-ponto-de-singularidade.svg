<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1810"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <circle cx="0" cy="0" r="3" fill="#ff8a65" opacity="1"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#ff8a65" stroke-width="1" opacity="0.7" stroke-dasharray="2,2"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#ff8a65" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff8a65" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,4"/>
  </g>
</svg>