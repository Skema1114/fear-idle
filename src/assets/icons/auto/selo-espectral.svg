<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f1530"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#b388ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#b388ff" stroke-width="1" opacity="0.4"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#b388ff" stroke-width="1" opacity="0.4"/>
  </g>
</svg>