<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1810"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="#ff8a65" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="#ff8a65" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#ff8a65" stroke-width="1" opacity="0.5"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#ff8a65" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#ff8a65" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#ff8a65"/>
  </g>
</svg>