<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f1530"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <rect x="-12" y="-10" width="24" height="20" rx="2" fill="#b388ff" opacity="0.7"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#0d0d12" stroke-width="2"/>
    <line x1="-8" y1="-4" x2="-3" y2="-4" stroke="#0d0d12" stroke-width="1"/>
    <line x1="-8" y1="0" x2="-3" y2="0" stroke="#0d0d12" stroke-width="1"/>
    <line x1="3" y1="-4" x2="8" y2="-4" stroke="#0d0d12" stroke-width="1"/>
  </g>
</svg>