<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <circle cx="0" cy="0" r="14" fill="#e0e0e0" opacity="0.15"/>
    <circle cx="0" cy="0" r="10" fill="#e0e0e0" opacity="0.25"/>
    <circle cx="0" cy="0" r="6" fill="#e0e0e0" opacity="0.4"/>
    <circle cx="0" cy="0" r="2" fill="#e0e0e0" opacity="0.9"/>
  </g>
</svg>