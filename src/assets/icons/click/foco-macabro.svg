<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1015"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-16" x2="0" y2="-8" stroke="#e63946" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="8" x2="0" y2="16" stroke="#e63946" stroke-width="1.5" opacity="0.7"/>
    <line x1="-16" y1="0" x2="-8" y2="0" stroke="#e63946" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="0" x2="16" y2="0" stroke="#e63946" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#e63946" opacity="0.8"/>
  </g>
</svg>