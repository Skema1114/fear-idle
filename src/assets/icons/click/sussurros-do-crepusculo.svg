<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f1530"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <line x1="0" y1="-5" x2="0" y2="12" stroke="#b388ff" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="0" cy="-8" rx="4" ry="6" fill="#b388ff" opacity="0.7"/>
    <ellipse cx="0" cy="-10" rx="2" ry="4" fill="#b388ff" opacity="0.9"/>
  </g>
</svg>