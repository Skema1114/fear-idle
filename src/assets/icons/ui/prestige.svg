<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(32,32)">
    <circle cx="0" cy="0" r="12" fill="#82b1ff" opacity="0.6"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#0d0d12" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="none" stroke="#0d0d12" stroke-width="1" opacity="0.3"/>
  </g>
</svg>